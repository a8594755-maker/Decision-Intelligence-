<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartOps AI Employee</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      padding: 12px;
      padding-bottom: 32px;
      line-height: 1.5;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--primary);
      flex-shrink: 0;
    }
    .header h1 { font-size: 15px; font-weight: 600; }
    .header .logo { width: 24px; height: 24px; background: var(--primary); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; }
    .header .auto-badge {
      margin-left: auto;
      display: flex; align-items: center; gap: 4px;
      padding: 3px 8px;
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 10px; font-size: 10px; color: var(--success); font-weight: 600;
    }
    .header .auto-badge .dot {
      width: 6px; height: 6px; background: var(--success); border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* Auth section */
    #auth-section { margin: 12px 0; flex-shrink: 0; }
    .auth-form { display: flex; flex-direction: column; gap: 8px; }
    .auth-form input {
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
    }
    .auth-status {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: var(--radius); font-size: 11px; color: var(--success);
    }

    /* Buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px 14px;
      border: none; border-radius: var(--radius);
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
      width: 100%;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
    .btn-outline {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-outline:hover:not(:disabled) { background: #f1f5f9; }
    .btn-sm { padding: 6px 10px; font-size: 12px; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 8px;
    }
    .card-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; }

    /* Loading */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none; }

    /* Chat — takes remaining space */
    #main-content {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      margin-top: 10px;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
      min-height: 120px;
    }
    .chat-msg {
      padding: 8px 10px;
      border-radius: var(--radius);
      margin-bottom: 6px;
      font-size: 12px;
      line-height: 1.5;
      max-width: 90%;
    }
    .chat-user {
      background: var(--primary);
      color: white;
      margin-left: auto;
      text-align: right;
    }
    .chat-ai {
      background: #f1f5f9;
      color: var(--text);
    }
    .chat-system {
      background: #fef3c7;
      color: #92400e;
      font-size: 11px;
      text-align: center;
      max-width: 100%;
    }

    .chat-input-area {
      flex-shrink: 0;
      padding-top: 8px;
    }

    /* Auto mode log (collapsed by default) */
    #automode-log-section {
      flex-shrink: 0;
      max-height: 100px;
      overflow-y: auto;
      border-top: 1px solid var(--border);
      padding-top: 6px;
      margin-top: 6px;
      font-size: 10px;
      font-family: monospace;
      color: var(--text-muted);
    }

    /* Status bar */
    .status-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 4px 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 10px; color: var(--text-muted);
      display: flex; align-items: center; gap: 6px;
    }
    .status-bar .ops-count {
      margin-left: auto;
      font-size: 10px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">DI</div>
  <h1>SmartOps AI Employee</h1>
  <div class="auto-badge" id="auto-badge">
    <span class="dot"></span> AUTO
  </div>
</div>

<!-- Auth Section -->
<div id="auth-section">
  <div id="auth-login" class="card">
    <div class="card-title">Connect to SmartOps</div>
    <div class="auth-form">
      <input type="email" id="input-email" placeholder="Email" />
      <input type="password" id="input-password" placeholder="Password" />
      <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
      <div id="auth-error" class="hidden" style="color:var(--danger);font-size:12px;"></div>
    </div>
  </div>
  <div id="auth-connected" class="auth-status hidden">
    <span>&#9679;</span> Connected
    <span id="auth-user" style="margin-left:auto;"></span>
    <button class="btn btn-outline btn-sm" style="width:auto;margin-left:8px;" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<!-- Main Content (hidden until authenticated) -->
<div id="main-content" class="hidden">

  <!-- Chat (full height, always visible) -->
  <div id="chat-messages">
    <div class="chat-msg chat-system">
      AI Employee connected. Auto Mode is always on — I'll execute operations on this workbook automatically. Just tell me what you need.
    </div>
  </div>

  <div class="chat-input-area">
    <div style="display:flex;gap:6px;">
      <input type="text" id="chat-input" placeholder="Tell me what to do..."
        style="flex:1;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;"
        onkeydown="if(event.key==='Enter')sendChat()" />
      <button class="btn btn-primary" style="width:auto;padding:8px 12px;" onclick="sendChat()">Send</button>
    </div>
    <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px;">
      <button class="btn btn-outline btn-sm" style="width:auto;font-size:11px;" onclick="quickChat('Run MBR analysis on this data')">MBR Analysis</button>
      <button class="btn btn-outline btn-sm" style="width:auto;font-size:11px;" onclick="quickChat('Summarize this worksheet')">Summarize</button>
      <button class="btn btn-outline btn-sm" style="width:auto;font-size:11px;" onclick="quickChat('What are the key risks?')">Risks</button>
      <button class="btn btn-outline btn-sm" style="width:auto;font-size:11px;" onclick="quickChat('Create a dashboard')">Dashboard</button>
    </div>
  </div>

  <!-- Auto mode operation log (always running, compact) -->
  <div id="automode-log-section">
    <div id="automode-log"></div>
  </div>

</div>

<!-- Hidden elements needed by Auto Mode (always-on) -->
<div class="hidden">
  <input type="checkbox" id="pref-autosave" checked />
  <input type="checkbox" id="pref-autoupload" />
  <input type="checkbox" id="pref-autoformat" checked />
  <input type="text" id="pref-prefix" value="DI_" />
  <div id="automode-progress-bar"></div>
  <div id="automode-progress-text"></div>
</div>

<div class="status-bar" id="status-bar">
  <span id="status-text">Ready</span>
  <span class="ops-count" id="ops-count">0 ops</span>
</div>

<script src="src/taskpane.js"></script>
</body>
</html>
