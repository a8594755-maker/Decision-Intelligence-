name: planning-forecast-regression

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  regression-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    env:
      PYTHONHASHSEED: '0'
      PYTHONUNBUFFERED: '1'
      TZ: 'UTC'
      OMP_NUM_THREADS: '1'
      OPENBLAS_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
      NUMEXPR_NUM_THREADS: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: 'requirements-ml.txt'

      - name: Install regression test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-timeout pydantic numpy pandas ortools requests

      - name: Run planning + forecast regression suite
        run: |
          pytest -q tests/regression --maxfail=1 --durations=10 --timeout=30

      - name: Run lightweight ML smoke tests
        run: |
          pip install -q lightgbm scikit-learn
          pytest -q tests/test_retrain_triggers.py tests/test_orchestrator.py --timeout=45
        continue-on-error: true
