name: automl-retrain-scheduled

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:
    inputs:
      enable_auto_retrain:
        description: "Run real training + promotion (true) or dry-run (false)"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      series_ids:
        description: "Comma-separated series IDs (blank uses default)"
        required: false
        default: ""

jobs:
  automl-retrain:
    name: AutoML Retrain Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      actions: read
    env:
      PYTHONHASHSEED: "0"
      PYTHONUNBUFFERED: "1"
      TZ: "UTC"
      DEFAULT_SERIES: "SYNTHETIC"
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas scikit-learn lightgbm pydantic

      - name: Determine pipeline parameters
        id: params
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            AUTO="${{ github.event.inputs.enable_auto_retrain }}"
            SERIES="${{ github.event.inputs.series_ids }}"
          else
            AUTO="false"
            SERIES="${DEFAULT_SERIES}"
          fi

          if [ "${AUTO}" = "true" ]; then
            DRY_RUN="false"
          else
            DRY_RUN="true"
          fi

          echo "auto_retrain=${AUTO}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"
          echo "series=${SERIES:-$DEFAULT_SERIES}" >> "$GITHUB_OUTPUT"

      - name: Run AutoML retrain pipeline
        id: pipeline
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ steps.params.outputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          ENABLE_AUTO_RETRAIN="${{ steps.params.outputs.auto_retrain }}" \
          python scripts/automl_retrain_pipeline.py \
            --series "${{ steps.params.outputs.series }}" \
            --report pipeline_report.json \
            --trigger-root registry_store/retrain_triggers \
            --registry-root registry_store/model_lifecycle \
            --horizon 30 \
            ${DRY_RUN_FLAG} \
            --verbose

      - name: Parse pipeline report
        id: report
        if: always()
        run: |
          python - <<'PY'
          import json
          import os

          output_path = os.environ["GITHUB_OUTPUT"]
          defaults = {
              "triggered": "0",
              "completed": "0",
              "promoted": "0",
              "dry_run": "true",
              "has_errors": "true",
              "error_series": "report_missing",
          }

          try:
              with open("pipeline_report.json", "r", encoding="utf-8") as f:
                  report = json.load(f)

              errors = [
                  sid
                  for sid, item in report.get("series_results", {}).items()
                  if item.get("outcome") == "error"
              ]
              payload = {
                  "triggered": str(report.get("retrain_triggered_count", 0)),
                  "completed": str(report.get("retrain_completed_count", 0)),
                  "promoted": str(report.get("promoted_count", 0)),
                  "dry_run": str(report.get("dry_run", True)).lower(),
                  "has_errors": "true" if errors else "false",
                  "error_series": ",".join(errors),
              }
          except Exception:
              payload = defaults

          with open(output_path, "a", encoding="utf-8") as out:
              for key, value in payload.items():
                  out.write(f"{key}={value}\n")
          PY

      - name: Generate GitHub summary
        if: always()
        run: |
          python - <<'PY'
          import json
          import os

          lines = [
              "## AutoML Retrain Pipeline Summary",
              "",
          ]

          try:
              with open("pipeline_report.json", "r", encoding="utf-8") as f:
                  report = json.load(f)
              mode = "Dry-run" if report.get("dry_run", True) else "Real training"
              lines.extend(
                  [
                      f"- Mode: **{mode}**",
                      f"- Pipeline ID: `{report.get('pipeline_id', 'N/A')}`",
                      f"- Series count: **{report.get('series_count', 0)}**",
                      f"- Retrain triggered: **{report.get('retrain_triggered_count', 0)}**",
                      f"- Retrain completed: **{report.get('retrain_completed_count', 0)}**",
                      f"- Promoted: **{report.get('promoted_count', 0)}**",
                      "",
                      "| Series | Drift | Retrain | Train | Promote |",
                      "|---|---:|:---:|:---:|:---:|",
                  ]
              )
              for sid, item in report.get("series_results", {}).items():
                  drift = (item.get("drift") or {}).get("drift_score", "N/A")
                  retrain = "yes" if (item.get("evaluate") or {}).get("should_retrain") else "no"
                  train = "skipped" if (item.get("train") or {}).get("skipped") else "ok"
                  promote = "skipped" if (item.get("promote") or {}).get("skipped") else "ok"
                  if item.get("outcome") == "error":
                      train = "error"
                      promote = "error"
                  lines.append(f"| {sid} | {drift} | {retrain} | {train} | {promote} |")
          except Exception as exc:
              lines.append(f"- Failed to read pipeline_report.json: `{exc}`")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "w", encoding="utf-8") as f:
              f.write("\n".join(lines))
          PY

      - name: Commit pipeline report
        if: always() && github.event_name == 'schedule'
        run: |
          if [ ! -f pipeline_report.json ]; then
            echo "pipeline_report.json not found; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pipeline_report.json
          if git diff --cached --quiet; then
            echo "No changes in pipeline_report.json"
          else
            git commit -m "chore(ml): update pipeline_report.json [$(date -u +%Y-%m-%d)]"
            git push
          fi

      - name: Slack notification
        if: steps.report.outputs.triggered != '0' && steps.report.outputs.dry_run == 'false' && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "AutoML retrain pipeline completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*AutoML Retrain Pipeline*\n• Retrain triggered: ${{ steps.report.outputs.triggered }}\n• Retrain completed: ${{ steps.report.outputs.completed }}\n• Promoted: ${{ steps.report.outputs.promoted }}\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

      - name: Upload pipeline report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: automl-retrain-pipeline-report-${{ github.run_id }}
          path: pipeline_report.json
          if-no-files-found: warn
          retention-days: 30

      - name: Fail job when series errors exist
        if: steps.report.outputs.has_errors == 'true'
        run: |
          echo "Pipeline failed for series: ${{ steps.report.outputs.error_series }}"
          exit 1
