name: phase4-guardrails

on:
  pull_request:
    paths:
      - "src/ml/api/registry_router.py"
      - "src/ml/registry/**"
      - "tests/test_action_guardrails.py"
      - "tests/test_registry_router_guardrails.py"
      - "tests/test_retrain_triggers.py"
      - "tests/test_model_lifecycle_registry.py"
      - "tests/test_promotion_gates.py"
      - ".github/workflows/phase4-guardrails.yml"
      - "package.json"
  push:
    branches: [main]
    paths:
      - "src/ml/api/registry_router.py"
      - "src/ml/registry/**"
      - "tests/test_action_guardrails.py"
      - "tests/test_registry_router_guardrails.py"
      - "tests/test_retrain_triggers.py"
      - "tests/test_model_lifecycle_registry.py"
      - "tests/test_promotion_gates.py"
      - ".github/workflows/phase4-guardrails.yml"
      - "package.json"

jobs:
  guardrails-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      PYTHONHASHSEED: "0"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest fastapi pydantic

      - name: Run Phase 4 guardrail regression suite
        run: |
          python -m pytest -q \
            tests/test_action_guardrails.py \
            tests/test_registry_router_guardrails.py \
            tests/test_retrain_triggers.py \
            tests/test_model_lifecycle_registry.py \
            tests/test_promotion_gates.py
