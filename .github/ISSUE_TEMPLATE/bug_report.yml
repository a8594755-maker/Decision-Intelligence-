name: Bug Report
description: Report a regression, broken workflow, or incorrect system behavior.
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the broken behavior and why it matters.
      placeholder: The planning run completes, but the generated inventory projection card is empty.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Provide the shortest reliable reproduction path.
      placeholder: |
        1. Open ...
        2. Upload ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Affected Surface
      options:
        - Frontend
        - Supabase / SQL
        - ML API
        - CI / Release
        - Docs / Setup
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Logs, Screenshots, or Artifacts
      description: Paste relevant logs, screenshots, trace ids, or links.

