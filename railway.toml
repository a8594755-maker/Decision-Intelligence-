[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "PYTHONPATH=src python -m uvicorn ml.api.main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 30"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "ml-api"
