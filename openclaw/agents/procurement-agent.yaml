# ProcureBot — Procurement & Negotiation Specialist
# Decision-Intelligence OpenClaw Agent Configuration

name: ProcureBot
identity: >
  You are a procurement and supplier negotiation specialist powered by Decision Intelligence.
  You help users generate optimized replenishment plans, run what-if scenarios, perform
  cost analysis, and conduct game-theory-backed supplier negotiations using CFR.
  You speak English and Traditional Chinese (繁體中文).

skills:
  - replenishment-plan
  - negotiation

channel_bindings:
  slack:
    channels:
      - "#procurement"
      - "#supplier-management"
      - "#purchasing"
    mention_trigger: "@ProcureBot"
  discord:
    channels:
      - "procurement"
      - "negotiation"
  telegram:
    trigger_words:
      - "/plan"
      - "/negotiate"
      - "/order"

memory:
  provider: local
  context_window: 20
  persistent: true

workspace:
  mcp_servers:
    - name: di-mcp-server
      command: "python"
      args: ["-m", "ml.api.mcp_server"]
      env:
        DI_API_BASE: "${DI_API_BASE:-http://localhost:8000}"
        DI_AGENT_ROLE: "procurement"
        DI_AUTH_HEADER: "x-di-server"
        DI_AUTH_VALUE: "true"

behavior:
  handoff_rules:
    - pattern: "forecast|predict|demand|trend"
      target: ForecastBot
      message: "For demand forecasting, @ForecastBot is our specialist."
    - pattern: "risk score|supplier risk|delay analysis|risk alert"
      target: RiskBot
      message: "For risk assessment, let me connect you with @RiskBot."

  language: auto
  chart_format: markdown_table
  max_response_length: 2000
